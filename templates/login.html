{% extends "base.html" %}

{% block title %}Sign In - AutoAssemble Cloud Portal{% endblock %}

{% block content %}
<div class="login-body">
    <div class="glass-card login-card" id="login-container-card">
        <div class="login-logo">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 0.5rem;">
                <rect x="3" y="11" width="18" height="10" rx="2" ry="2"></rect>
                <circle cx="7" cy="21" r="2"></circle>
                <circle cx="17" cy="21" r="2"></circle>
                <path d="M19 11V6a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v5"></path>
            </svg>
            <div>AutoAssemble</div>
        </div>
        <div class="login-subtitle">Automotive Manufacturing Cloud Operations</div>
        
        <form action="{{ url_for('auth.login') }}" method="POST" id="login-form">
            <!-- CSRF Protection Token -->
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="form-group" style="text-align: left;">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="e.g. admin" required autocomplete="username">
            </div>
            
            <div class="form-group" style="text-align: left; margin-bottom: 2rem;">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;" id="btn-login-submit">
                <span>Access Portal</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>
        </form>
        
        <div style="margin-top: 1.5rem; font-size: 0.8rem; color: var(--text-secondary);">
            Authorized access only. Logins and actions are recorded.
        </div>
    </div>
</div>
{% endblock %}
